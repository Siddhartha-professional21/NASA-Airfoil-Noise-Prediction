name: NASA Airfoil ML Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  data-check:
    name: Data Validation
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - run: pip install pandas numpy requests
    - run: python tests/test_data.py

  model-test:
    name: Model Testing
    runs-on: ubuntu-latest
    needs: data-check
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - run: pip install numpy scikit-learn
    - run: python tests/test_model.py

  api-test:
    name: API Testing
    runs-on: ubuntu-latest
    needs: model-test
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - run: pip install fastapi pydantic
    - run: python tests/test_api.py

  deploy-ready:
    name: Deploy Ready
    runs-on: ubuntu-latest
    needs: api-test
    steps:
    - uses: actions/checkout@v4
    - name: All stages passed
      run: |
        echo '================================'
        echo 'Data      - VALIDATED'
        echo 'Model     - TESTED'
        echo 'API       - VERIFIED'
        echo 'Status    - READY FOR DEPLOYMENT'
        echo '================================'
