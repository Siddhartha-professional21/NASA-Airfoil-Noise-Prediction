name: NASA Airfoil CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn pydantic numpy

    - name: Test API imports
      run: |
        python -c "from fastapi import FastAPI; print('FastAPI import OK')"
        python -c "import numpy; print('Numpy import OK')"
        python -c "import uvicorn; print('Uvicorn import OK')"

    - name: Test API structure
      run: |
        python -c "
from fastapi import FastAPI
from pydantic import BaseModel
app = FastAPI()
print('FastAPI app created successfully')
print('CI CD pipeline test passed')
"
